<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connor Bottrell - CV</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cv-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .cv-viewer {
            width: 100%;
            height: 800px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .cv-download {
            text-align: center;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Connor Bottrell</h1>
            <button class="hamburger" id="hamburger" title="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Floating Theme Toggle Button -->
    <button class="floating-theme-toggle" id="themeToggle" title="Toggle dark/light mode">☯</button>

    <main>
        <section class="section">
            <div class="cv-container">
                <p style="text-align: center; margin-bottom: 2rem;">
                    <a href="assets/Bottrell-CV.pdf" download class="button">Download CV (PDF)</a>
                </p>
                <embed src="assets/Bottrell-CV.pdf" type="application/pdf" class="cv-viewer">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Connor Bottrell. Built with GitHub Pages.</p>
    </footer>

    <script>
        // Initialize theme on page load
        function initTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            
            // Check saved preference or default to dark
            const savedTheme = localStorage.getItem('theme') || 'dark';
            
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
            } else {
                body.classList.remove('light-mode');
            }
            
            // Theme toggle button listener
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                
                const isLight = body.classList.contains('light-mode');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });
        }
        
        // Mobile menu toggle
        function initMobileMenu() {
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            
            hamburger.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
            
            // Close menu when a link is clicked
            const navLinks = navMenu.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                });
            });
        }
        
        // Run on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                initTheme();
                initMobileMenu();
            });
        } else {
            initTheme();
            initMobileMenu();
        }
    </script>
</body>
</html>

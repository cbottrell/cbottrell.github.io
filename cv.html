<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connor Bottrell - CV</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cv-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .cv-viewer {
            width: 100%;
            height: 800px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .cv-download {
            text-align: center;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Connor Bottrell</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="cv-container">
                <p style="text-align: center; margin-bottom: 2rem;">
                    <a href="assets/Bottrell-CV.pdf" download class="button">Download CV (PDF)</a>
                </p>
                <embed src="assets/Bottrell-CV.pdf" type="application/pdf" class="cv-viewer">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Connor Bottrell. Built with GitHub Pages.</p>
    </footer>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.textContent = '🌞';
        }

        // Theme toggle functionality
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌞';
            } else {
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
